name: CodeRabbit Auto Fix

concurrency:
  group: coderabbit-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  ai_fix:
    runs-on: ubuntu-latest
    # Run on CodeRabbit line comment OR CodeRabbit full review (so ClickUp gets comment in both cases)
    if: |
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.user.login, 'coderabbit')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.user.login, 'coderabbit'))

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract CodeRabbit comment (line comment or full review body)
        id: comment
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_JSON: ${{ toJSON(github.event.comment.body || '') }}
          REVIEW_JSON: ${{ toJSON(github.event.review.body || '') }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            COMMENT_BODY=$(echo "$COMMENT_JSON" | jq -r .)
          else
            COMMENT_BODY=$(echo "$REVIEW_JSON" | jq -r .)
          fi
          echo "COMMENT_BODY<<DELIM" >> $GITHUB_ENV
          echo "$COMMENT_BODY" >> $GITHUB_ENV
          echo "DELIM" >> $GITHUB_ENV

      - name: Log CodeRabbit suggestion
        run: |
          echo "CodeRabbit suggestion:"
          echo "$COMMENT_BODY"

      - name: Check if Codegen is configured
        id: codegen_check
        run: |
          if [ -n "$CODEGEN_API_KEY" ]; then echo "enabled=true" >> $GITHUB_OUTPUT; else echo "enabled=false" >> $GITHUB_OUTPUT; fi
        env:
          CODEGEN_API_KEY: ${{ secrets.CODEGEN_API_KEY }}

      - name: Send suggestion to Codegen AI
        if: steps.codegen_check.outputs.enabled == 'true'
        env:
          CODEGEN_API_KEY: ${{ secrets.CODEGEN_API_KEY }}
        run: |
          BODY=$(jq -n --arg c "$COMMENT_BODY" '{comment: $c}')
          curl -s -w "\n%{http_code}" -X POST https://api.codegen.ai/fix \
            -H "Authorization: Bearer $CODEGEN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" || true
          code=$?
          if [ $code -eq 6 ]; then
            echo "::warning::Codegen API: curl exit 6 = Couldn't resolve host (DNS/network). Check api.codegen.ai."
          elif [ $code -ne 0 ]; then
            echo "::warning::Codegen API request failed with exit $code"
          fi

      - name: Commit fixes if AI modified files
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

          git add .

          if git diff --staged --quiet; then
            echo "No code changes detected."
          else
            git commit -m "fix: apply CodeRabbit suggestion"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Extract ClickUp task ID
        id: clickup
        run: |
          TEXT="${{ github.event.pull_request.body }} ${{ github.event.pull_request.title }}"
          TASK_ID=$(echo "$TEXT" | grep -oE 'clickup\.com/t/[a-z0-9]+' | head -1 | sed 's|.*/t/||')

          if [ -z "$TASK_ID" ]; then
            TASK_ID="${{ secrets.CLICKUP_TASK_ID }}"
          fi

          echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV

      - name: Post CodeRabbit suggestion to ClickUp
        if: env.TASK_ID != ''
        run: |

          COMMENT="CodeRabbit Review Suggestion

          $COMMENT_BODY

          PR: ${{ github.event.pull_request.html_url }}
          Repo: ${{ github.repository }}
          Branch: ${{ github.event.pull_request.head.ref }}"

          BODY=$(jq -n --arg text "$COMMENT" '{comment_text:$text, notify_all:false}')

          curl -s -w "\n%{http_code}" -X POST "https://api.clickup.com/api/v2/task/${TASK_ID}/comment" \
            -H "Authorization: ${{ secrets.CLICKUP_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" || true
          code=$?
          if [ $code -eq 6 ]; then
            echo "::warning::ClickUp API: curl exit 6 = Couldn't resolve host (DNS/network). Check api.clickup.com."
          elif [ $code -ne 0 ]; then
            echo "::warning::ClickUp API request failed with exit $code"
          fi

      - name: Finish
        run: echo "Workflow completed."