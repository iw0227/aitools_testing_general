name: CodeRabbit Auto Fix

concurrency:
  group: coderabbit-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  ai_fix:
    runs-on: ubuntu-latest

    if: |
      contains(github.event.comment.user.login, 'coderabbit') ||
      contains(github.event.review.user.login, 'coderabbit')

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract CodeRabbit comment
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_JSON: ${{ toJSON(github.event.comment.body || '') }}
          REVIEW_JSON: ${{ toJSON(github.event.review.body || '') }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            COMMENT_BODY=$(echo "$COMMENT_JSON" | jq -r .)
          else
            COMMENT_BODY=$(echo "$REVIEW_JSON" | jq -r .)
          fi

          echo "COMMENT_BODY<<EOF" >> $GITHUB_ENV
          echo "$COMMENT_BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Debug comment
        run: |
          echo "Detected CodeRabbit suggestion:"
          echo "$COMMENT_BODY"

      - name: Skip if comment empty
        run: |
          if [ -z "$COMMENT_BODY" ]; then
            echo "No comment body found. Skipping."
            exit 0
          fi

      # Optional Codegen integration
      - name: Send suggestion to Codegen AI
        env:
          CODEGEN_API_KEY: ${{ secrets.CODEGEN_API_KEY }}
        run: |
          if [ -z "$CODEGEN_API_KEY" ]; then
            echo "CODEGEN_API_KEY not configured, skipping Codegen step."
            exit 0
          fi

          echo "Sending suggestion to Codegen AI"

          printf '%s' "$COMMENT_BODY" > /tmp/comment.txt
          BODY=$(jq -n --rawfile c /tmp/comment.txt '{comment:$c}')

          RESP=$(curl -s -w "\n%{http_code}" -X POST https://api.codegen.ai/fix \
            -H "Authorization: Bearer $CODEGEN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY" || true)

          echo "Codegen response:"
          echo "$RESP"

      - name: Commit fixes if AI modified files
        run: |
          git config user.name "ai-bot"
          git config user.email "ai@bot.com"

          git add .

          if git diff --staged --quiet; then
            echo "No code changes detected."
          else
            git commit -m "fix: apply CodeRabbit suggestion"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Extract ClickUp task ID
        run: |
          TEXT="${{ github.event.pull_request.body }} ${{ github.event.pull_request.title }}"

          TASK_ID=$(echo "$TEXT" | grep -oE 'clickup\.com/t/[a-z0-9]+' | head -1 | sed 's|.*/t/||')

          if [ -z "$TASK_ID" ]; then
            TASK_ID="${{ secrets.CLICKUP_TASK_ID }}"
          fi

          echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV
          echo "Detected ClickUp task ID: $TASK_ID"

      - name: Post CodeRabbit suggestion to ClickUp
        if: env.TASK_ID != ''
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
        run: |

          COMMENT="CodeRabbit Review Suggestion

          $COMMENT_BODY

          PR: ${{ github.event.pull_request.html_url }}
          Repo: ${{ github.repository }}
          Branch: ${{ github.event.pull_request.head.ref }}"

          BODY=$(jq -n --arg text "$COMMENT" '{comment_text:$text, notify_all:false}')

          RESP=$(curl -s -w "\n%{http_code}" -X POST "https://api.clickup.com/api/v2/task/${TASK_ID}/comment" \
            -H "Authorization: $CLICKUP_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESP" | tail -n1)

          echo "ClickUp response code: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ClickUp response:"
            echo "$RESP"
          fi

      - name: Finish
        run: echo "Workflow completed successfully."